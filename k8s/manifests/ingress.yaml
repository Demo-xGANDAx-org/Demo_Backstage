apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backstage-ingress
  namespace: backstage
  
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - backstage.xgandax.xyz
    secretName: backstage-tls

  rules:
    - host: backstage.xgandax.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backstage
                port:
                  number: 80